<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />

  <link rel="apple-touch-icon" href="https://huang-husky.github.io/SageLume/favicon/apple-touch-icon.png" />
  <link rel="icon" type="image/svg+xml" href="https://huang-husky.github.io/SageLume/favicon/favicon.svg" />
  <link rel="shortcut icon" href="https://huang-husky.github.io/SageLume/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://huang-husky.github.io/SageLume/style.css" />
  <script src="https://huang-husky.github.io/SageLume/js/theme-toggle.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ys-bg: #f5f0e8; --ys-paper: #faf7f0; --ys-ink: #2c2417; --ys-ink-lt: #5c5040;
      --ys-sage: #5a7a5e; --ys-sage-dk: #3d5940; --ys-amber: #c8902a; --ys-zhu: #c0392b;
      --ys-border: #d4c9b0; --ys-shadow: rgba(44,36,23,.12);
    }
    [data-theme="dark"] {
      --ys-bg: #1a1812; --ys-paper: #221f16; --ys-ink: #e8e0cc; --ys-ink-lt: #a09078;
      --ys-sage: #7aaa7e; --ys-sage-dk: #9fcfa3; --ys-amber: #d4a84b; --ys-zhu: #e05a4a;
      --ys-border: #3a3428; --ys-shadow: rgba(0,0,0,.4);
    }
    *, *::before, *::after { box-sizing: border-box; }
    .ys-body { background: var(--ys-bg); font-family: 'Noto Serif SC', serif; }
    .ys-body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(180,160,120,.06) 28px, rgba(180,160,120,.06) 29px);
    }

    /* 面包屑 */
    .breadcrumb {
      position: relative; z-index: 1;
      max-width: 900px; margin: 0 auto;
      padding: 14px 24px 0;
      font-family: 'Noto Sans SC', sans-serif; font-size: .72rem;
      color: var(--ys-ink-lt); letter-spacing: .05em;
    }
    .breadcrumb a { color: var(--ys-sage); text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb span { margin: 0 5px; opacity: .4; }

    /* Banner */
    .ys-banner {
      position: relative; z-index: 1; text-align: center;
      padding: 36px 24px 28px; border-bottom: 1px solid var(--ys-border);
      background: linear-gradient(to bottom, var(--ys-paper), transparent);
    }
    .ys-tag-line { font-family: 'Noto Sans SC', sans-serif; font-size: .72rem; letter-spacing: .2em; color: var(--ys-amber); margin-bottom: 6px; }
    .ys-title { font-size: 2.4rem; font-weight: 700; letter-spacing: .2em; color: var(--ys-sage-dk); }
    .ys-divider { width: 50px; height: 1px; margin: 12px auto; background: linear-gradient(to right, transparent, var(--ys-amber), transparent); }
    .ys-desc { font-size: .85rem; color: var(--ys-ink-lt); letter-spacing: .08em; line-height: 1.8; }

    /* 主体 */
    .ys-main { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 24px 80px; }

    /* 两大卡片（道经/德经） */
    .jing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 20px; }
    @media (max-width: 560px) { .jing-grid { grid-template-columns: 1fr; } }

    .jing-card {
      background: var(--ys-paper); border: 1px solid var(--ys-border); border-radius: 6px;
      padding: 32px 28px 26px; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; gap: 12px; position: relative; overflow: hidden;
      transition: transform .2s, box-shadow .2s, border-color .2s;
      box-shadow: 0 3px 12px var(--ys-shadow);
    }
    .jing-card::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
      background: var(--ys-sage); transition: width .2s;
    }
    .jing-card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px var(--ys-shadow); border-color: var(--ys-sage); }
    .jing-card:hover::before { width: 6px; }
    .jing-card.disabled { opacity: .45; cursor: default; pointer-events: none; }

    .jing-num { font-size: 3rem; font-weight: 700; color: var(--ys-sage-dk); opacity: .15; position: absolute; top: 16px; right: 20px; line-height: 1; }
    .jing-label { font-family: 'Noto Sans SC', sans-serif; font-size: .68rem; letter-spacing: .15em; color: var(--ys-amber); }
    .jing-title { font-size: 1.6rem; font-weight: 700; letter-spacing: .15em; color: var(--ys-sage-dk); }
    .jing-desc { font-size: .82rem; color: var(--ys-ink-lt); line-height: 1.9; letter-spacing: .05em; }
    .jing-meta {
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'Noto Sans SC', sans-serif; font-size: .7rem; color: var(--ys-ink-lt); margin-top: 4px;
    }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; }
    .tag { background: rgba(90,122,94,.1); border: 1px solid rgba(90,122,94,.25); border-radius: 2px; padding: 1px 6px; font-size: .65rem; color: var(--ys-sage); }

    /* 说明区 */
    .info-box {
      margin-top: 8px; padding: 16px 20px; border: 1px solid var(--ys-border);
      border-radius: 4px; background: var(--ys-paper);
      font-size: .78rem; color: var(--ys-ink-lt); line-height: 1.9; letter-spacing: .05em;
    }
    .info-box b { color: var(--ys-sage-dk); }
  </style>
</head>

</body>
