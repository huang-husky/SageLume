<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜鸟的coding | SageLume</title>
  <meta name="description" content="WA菜鸟的AC旅程">
  <!-- Favicon -->
  <link rel="manifest" href="https://sage-lume.vercel.app/favicon/site.webmanifest">
  <link rel="apple-touch-icon" href="https://sage-lume.vercel.app/favicon/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-title" content="算海青藜">
  <link rel="icon" type="image/svg+xml" href="https://sage-lume.vercel.app/favicon/favicon.svg">
  <link rel="shortcut icon" href="https://sage-lume.vercel.app/favicon/favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="https://sage-lume.vercel.app/style.css">
  <link rel="stylesheet" href="https://sage-lume.vercel.app/coding.css">

  <!-- Scripts -->
  <script src="https://sage-lume.vercel.app/js/theme-toggle.js"></script>
  <script defer src="https://sage-lume.vercel.app/js/remap-headings.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var filterItems = document.querySelectorAll('.sidebar-filter-item');
      var entries = document.querySelectorAll('.coding-entry[data-platform]');

      // 统计各平台数量
      var counts = { all: entries.length };
      entries.forEach(function (e) {
        var p = e.dataset.platform;
        counts[p] = (counts[p] || 0) + 1;
      });

      // 更新 badge 数字
      filterItems.forEach(function (item) {
        var badge = item.querySelector('.sidebar-badge');
        if (badge) badge.textContent = counts[item.dataset.filter] ?? 0;
      });

      // 点击过滤
      filterItems.forEach(function (item) {
        item.addEventListener('click', function () {
          filterItems.forEach(function (i) { i.classList.remove('active'); });
          item.classList.add('active');
          var filter = item.dataset.filter;
          entries.forEach(function (entry) {
            entry.style.display = (filter === 'all' || entry.dataset.platform === filter) ? '' : 'none';
          });
        });
      });
    });
  </script>
</head>

<body>
  <!-- 主题切换按钮 -->
  <button class="theme-toggle" aria-label="切换深浅模式">
    <span class="icon sun">☀️</span>
    <span class="icon moon">🌙</span>
  </button>

  <a class="skip-to-content" href="#main-content">跳至内容</a>

  <header class="site-header">
    <div class="site-title">
      <a href="https://sage-lume.vercel.app/">
        <img src="https://sage-lume.vercel.app/favicon/logo-header.png" alt="算海青藜" height="96">
      </a>
    </div>
    <nav class="main-nav">
      <a href="https://sage-lume.vercel.app/">Home</a>
      <a href="https://sage-lume.vercel.app/about/">About</a>
      <a href="https://sage-lume.vercel.app/blog/">Blog</a>
    </nav>
  </header>

  <main id="main-content">
    <article class="post">
      <header class="post-header">
        <h1 class="post-title">菜鸟的coding</h1>
        <div class="post-meta">
          <span>持续更新中</span>
          <span> • </span>
          <span>日日编程，日有精进</span>
        </div>
      </header>

      <div class="post-content">
        <div class="coding-layout">

          <!-- 左侧筛选栏 -->
          <aside class="coding-sidebar">
            <div class="sidebar-section">
              <h3 class="sidebar-title">平台</h3>
              <ul class="sidebar-filter-list">
                <li class="sidebar-filter-item active" data-filter="all">全部 <span class="sidebar-badge">0</span></li>
                <li class="sidebar-filter-item" data-filter="leetcode">LeetCode <span class="sidebar-badge">0</span></li>
                <li class="sidebar-filter-item" data-filter="nowcoder">牛客网 <span class="sidebar-badge">0</span></li>
                <li class="sidebar-filter-item" data-filter="acm-scu">acm.scu.edu.cn <span class="sidebar-badge">0</span></li>
              </ul>
            </div>
          </aside>

          <!-- 右侧主内容 -->
          <div class="coding-main">

            <div class="coding-header-accent">
              <span class="coding-tag-badge"># 菜鸟的coding</span>
              <p class="coding-intro-text">
                养成每日刷题的习惯，哪怕只有一道。<br>
                每次记录：题目、代码、感受。<br>
                从菜鸟出发，不设终点。
              </p>
            </div>

            <!-- 记录列表 -->
            <div class="coding-list">

              <a href="https://sage-lume.vercel.app/blog/coding/day001/" class="coding-entry" data-platform="leetcode">
                <span class="coding-entry-day">Day<br>001</span>
                <div class="coding-entry-body">
                  <div class="coding-entry-title">两数之和（Two Sum）</div>

                </div>
              </a>

              <!-- 后续记录在这里追加 -->

            </div>

          </div><!-- /coding-main -->
        </div><!-- /coding-layout -->
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="footer-content">
      <p class="lume-separator">
        <img class="lume-image" src="https://sage-lume.vercel.app/favicon/logo-footer.png" alt="算海青藜" height="48">
      </p>
      <p>© 2026 z-o-s</p>
    </div>
  </footer>
</body>
</html>
